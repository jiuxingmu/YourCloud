services:
  postgres:
    image: postgres:16
    container_name: yourcloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yourcloud
      POSTGRES_USER: yourcloud
      POSTGRES_PASSWORD: yourcloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
