name: Deploy to Cloud Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      repo_lower: ${{ steps.meta.outputs.repo_lower }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./services/api-go
          file: ./services/api-go/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}-api:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lower }}-api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./clients/web
          file: ./clients/web/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/cloud
            VITE_BASE_PATH=/cloud/
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}-web:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.repo_lower }}-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            export GHCR_USER='${{ secrets.GHCR_USER }}'
            export GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}'
            export API_IMAGE='ghcr.io/${{ needs.build-and-push.outputs.repo_lower }}-api'
            export WEB_IMAGE='ghcr.io/${{ needs.build-and-push.outputs.repo_lower }}-web'
            export IMAGE_TAG='${{ needs.build-and-push.outputs.image_tag }}'
            ./scripts/deploy.prod.sh
